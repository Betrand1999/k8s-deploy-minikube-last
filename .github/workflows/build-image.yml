name: build and push docker image 
on: 
 push:
   branches:
     - dev-branch 
jobs:
  build:
   runs-on: self-hosted 
   if: false
   steps:
     - name: checkout arepo
       uses: actions/checkout@v2
     - name: login docker 
       uses: docker/login-action@v2 
       with:
         username: ${{ secrets.DOCKER_USERNAME}}
         password: ${{secrets.DOCKER_PASSWORD}}
     - name: build with docker 
       run: docker build -t local-image .
     - name: run the image 
       run: docker run -d -p 4060:80 local-image 
     - name: tag image 
       run: docker tag local-image:latest betrand1997/local-image:latest 
     - name: push image 
       run: docker push betrand1997/local-image:latest